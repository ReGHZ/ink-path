name: ink-path

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: ink-path-app
    command: sleep infinity
    working_dir: /workspace
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
      - pnpm_store:/home/node/.local/share/pnpm/store
      - zsh_history:/home/node/.cache/zsh
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ink_path
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: dev-only-change-me
      JWT_REFRESH_SECRET: dev-only-refresh-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    profiles: ["worker"]
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: ink-path-worker
    command: pnpm worker:dev
    working_dir: /workspace
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
      - pnpm_store:/home/node/.local/share/pnpm/store
      - zsh_history:/home/node/.cache/zsh
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ink_path
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: dev-only-change-me
      JWT_REFRESH_SECRET: dev-only-refresh-change-me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    container_name: ink-path-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ink_path
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ink_path"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: ink-path-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:management
    container_name: ink-path-rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ink-path-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:16333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  node_modules:
  pnpm_store:
  zsh_history:
  postgres_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
